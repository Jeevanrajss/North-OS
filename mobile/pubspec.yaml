name: north_os
description: "North OS — mobile client for the personal productivity cloud backend."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP + auth
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^14.0.0

  # UI
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  intl: ^0.19.0

  # Storage
  shared_preferences: ^2.2.3

  # SMS auto-import (Android only)
  permission_handler: ^11.3.0
  flutter_sms_inbox: ^1.0.4

  # Local notifications (Phase 11a) — on-device only, no Firebase/FCM/APNs
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4

  # Background sync (Phase 11c) — Android only, see background_sync.dart.
  # PHASE_11_SPEC.md pins ^0.5.2, but that version references Flutter's v1
  # embedding shim (removed in current SDKs) and fails to compile. 0.9.0+3
  # is the same API, rebuilt for v2-only embedding.
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
