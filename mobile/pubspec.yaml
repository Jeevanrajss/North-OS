name: north_os
description: "North OS — mobile client for the personal productivity cloud backend."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP + auth
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^14.0.0

  # UI
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  intl: ^0.19.0

  # Storage
  shared_preferences: ^2.2.3

  # SMS auto-import (Android only)
  permission_handler: ^11.3.0
  flutter_sms_inbox: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
